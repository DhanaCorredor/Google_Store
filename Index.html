<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Store</title>
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="responsive.css">

    <!-- Es la fuente que se debe añadir a nuestro index.html> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com" rel="stylesheet">

  </head>


  <body>
    <header>
      <nav>
        <!--logo-->
        <div class="google-logo">
            <a><img src="/img/google-logo.png" alt="Logo Google"></a>
        </div>
        <!--Menú-->
        <ul class="nav-links">
          <li><a href="#">Phones</a></li>
          <li><a href="#">Earbuds</a></li>
          <li><a href="#">Watches</a></li>
          <li><a href="#">Smart Home</a></li>
          <li><a href="#">Accesories</a></li>
          <li><a href="#">Subscriptions</a></li> 
        </ul>

        <!--Iconos de Acción-->
        <div class="nav-icons">
        <ul>
          <li><a href="#" >
          <img src="/img/icons/Search.svg" alt="serch,busqueda">  
          </a></li>
          <li><a href="#">
            <img src="/img/icons/Help.svg" alt="Help,Ayuda">
          </a></li>
          <li><a href="#">
            <img src="/img/icons/Cart.svg" alt="Cart,carrito de compra">
          </a></li>
          <li><a href="#">
            <img src="/img/icons/Avatar.svg" alt="User,Usuario"></a></li>
        </ul>
        </div>
        <!--este icono se usará en tamaño de móvil-->
        <ul class="menu-mobile">
          <li><img src="/img/icons/menu-icon1.svg" alt="menu"></li>
        </ul>
      </nav>
    </header>


  <!--section 1-->
  <main>
      <section>
        <div class="tarjeta-producto">
          <br>
          <p>← See product details</p>
          <img src="img/earbuds/earbuds_01.png" alt="Auriculares" width="200">
          <h1>Google Pixel Buds Pro</h1>
          <p>Music & Sound</p>
          <h2>229 €</h2>
          <hr>
        </div>
      </section>

      <!--section 2-->
        <section class="product-card">
          <form>
            <fieldset class="color-selector">
              <legend>Choose a color</legend>
              <label>
                <input type="radio" name="color" value="blue" />
                <span class="color blue"></span>
              </label>
              <label>
                <input type="radio" name="color" value="white" />
                <span class="color white"></span>
              </label>
              <label>
                <input type="radio" name="color" value="black" />
                <span class="color black"></span>
              </label>
              <label>
                <input type="radio" name="color" value="grey" />
                <span class="color grey"></span>
              </label>
              <label>
                <input type="radio" name="color" value="green" />
                <span class="color green"></span>
              </label>
              <label>
                <input type="radio" name="color" value="orange" />
                <span class="color orange"></span>
              </label>
            </fieldset>
            <h2>229 €</h2>
            <select name="Cantidad" id="cantidad">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>

            <button type="submit">Add to Cart</button>

          </form>
          <footer class="delivery">
            <p>
              <img src="img/icons/Delivery.svg" alt="Delivery">
              Delivers <time datetime="2024-04-20"> 20 Apr </time> to
              <strong>08023</strong>
            </p>
            <br>
          </footer>
        </section>
  </main>

    <!-- INICIO footer-->

    <footer class="site-footer">

      <!-- REDES SOCIALES -->
      <div class="site-redes-sociales">
        <ul class="lista-redes-sociales">
          <li>
            <a href="#" aria-label="X">
              <img src="img/icons/SM-x.svg" alt="X" class="icon">
            </a>
          </li>
          <li>
            <a href="#" aria-label="Instagram">
              <img src="img/icons/SM-instagram.svg" alt="Instagram" class="icon">
            </a>
          </li>
          <li>
            <a href="#" aria-label="Facebook">
              <img src="img/icons/SM-facebook.svg" alt="Facebook" class="icon">
            </a>
          </li>
          <li>
            <a href="#" aria-label="YouTube">
              <img src="img/icons/SM-youtube.svg" alt="YouTube" class="icon">
            </a>
          </li>
          <li>
            <a href="#" aria-label="TikTok">
              <img src="img/icons/SM-tiktok.svg" alt="TikTok" class="icon">
            </a>
          </li>
        </ul>
      </div>

      <!-- POLÍTICAS -->
      <nav class="site-footer-politicas" aria-label="Políticas del sitio">
        <ul class="lista-politicas">
          <li><a href="#">Privacy</a></li>
          <li><a href="#">Google Nest Commitment to Privacy</a></li>
          <li><a href="#">Sales Terms</a></li>
          <li><a href="#">Terms of Service</a></li>
        </ul>
      </nav>

      <!-- PAÍS -->
      <div class="site-pais">
        <a href="#" aria-label="País seleccionado: España">
          <img src="img/icons/Spain.svg" alt="Bandera de España" class="icon-bandera">
        </a>
        <span>Spain</span>
      </div>

    </footer>
    <!-- FIN FOOTER -->

</body>

</html>
